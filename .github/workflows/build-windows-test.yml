name: Build Windows test binary

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build"
        required: false
        default: "new-ui"

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build (no bundle — no signing key needed)
        run: pnpm tauri build --target x86_64-pc-windows-msvc --no-bundle

      - name: Upload .exe
        uses: actions/upload-artifact@v5
        with:
          name: mp3buddy-windows-test
          path: src-tauri/target/x86_64-pc-windows-msvc/release/mp3-buddy.exe
          if-no-files-found: warn
