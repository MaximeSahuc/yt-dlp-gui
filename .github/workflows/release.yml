name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          # --- Additional platforms (uncomment to re-enable) ---
          # - platform: windows-latest
          #   target: aarch64-pc-windows-msvc
          # - platform: macos-latest
          #   target: x86_64-apple-darwin
          # - platform: macos-latest
          #   target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          # 钉到 v10：v11 把 onlyBuiltDependencies 校验改到 lockfile 层，
          # 单独配置 package.json 不再生效，会导致 ERR_PNPM_IGNORED_BUILDS。
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          includeUpdaterJson: true
          args: --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

  # Package the browser extensions and attach them to the same release.
  extensions:
    name: Browser extensions
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Package extensions
        run: |
          set -euo pipefail
          mkdir -p dist-ext
          # zip the folder *contents* so manifest.json sits at the archive root
          ( cd browser-extension/chrome  && zip -r -FS "$GITHUB_WORKSPACE/dist-ext/mp3-buddy-extension-chrome.zip" . -x '.*' )
          # an .xpi is just a zip; Firefox can load it directly (temporary add-on / dev install)
          ( cd browser-extension/firefox && zip -r -FS "$GITHUB_WORKSPACE/dist-ext/mp3-buddy-extension-firefox.xpi" . -x '.*' )
          ls -l dist-ext

      - name: Upload as workflow artifacts
        uses: actions/upload-artifact@v5
        with:
          name: browser-extensions
          path: dist-ext/*

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.ref_name }}" dist-ext/* --clobber
